# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — LoRA training config for mlx_lm.lora (Apple MLX).
# Tuned to stay inside 16 GB unified memory on an Apple Silicon Mac:
#   4-bit base model, batch size 1, few LoRA layers, gradient checkpointing.
# CLI flags passed by train.sh OVERRIDE anything here (used for the OOM retry).
# ─────────────────────────────────────────────────────────────────────────────

# Base model — pre-quantized 4-bit, text-only, fits 16 GB comfortably.
model: "mlx-community/Qwen2.5-3B-Instruct-4bit"

train: true
fine_tune_type: lora

# Folder containing train.jsonl / valid.jsonl (MLX chat format).
data: "mlx_data"

seed: 3407

# Memory-safety knobs.
num_layers: 8            # only fine-tune the top 8 transformer blocks
batch_size: 1
max_seq_length: 2048
grad_checkpoint: true    # trade compute for memory

# Schedule.
iters: 600
learning_rate: 1.0e-5
val_batches: 25
steps_per_report: 20
steps_per_eval: 100
save_every: 100

# Let MLX apply the model's chat template to the {"messages": [...]} rows.
# (Do NOT pre-template the data.)
adapter_path: "planner_adapter"

# LoRA hyper-parameters.
lora_parameters:
  rank: 8
  scale: 20.0
  dropout: 0.0
